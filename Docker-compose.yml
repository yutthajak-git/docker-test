#version: "5.1.3" # กำหนด docker version
services:
    bun-app-compose: # ตั้งชื่อ container (เหมือน --name)
        container_name: ${APP_NAME}-api
        build: . # ตำแหน่ง dockerfile
        ports:
            - "${APP_PORT}:8000" # map port ออกมา เหมือน -p ใน docker run
        env_file: # อ่านไฟล์ .env
            - .env # โยน envให้ Bun รู้จัก
        depends_on:
            db:
                condition: service_healthy # รอให้ db healthy ก่อนจึงเริ่ม bun
        restart: always
    db:
        image: mysql:latest
        container_name: ${APP_NAME}-db

        environment:
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD} # กำหนด user ของ root mysql
            MYSQL_DATABASE: ${DB_NAME} # กำหนด database เริ่มต้นของ mysql
        volumes:
            - mysql_data_test:/var/lib/mysql
        restart: always
        healthcheck: #heal check db
            test:
                [
                    "CMD",
                    "mysqladmin",
                    "ping",
                    "-h",
                    "localhost",
                    "-u",
                    "root",
                    "-p${DB_ROOT_PASSWORD}",
                ]
            interval: 5s # ตรวจทุก 5 วิ
            timeout: 5s # timeout ต่อครั้ง
            retries: 10 # ลอง 10 ที
    phpmyadmin:
        image: phpmyadmin/phpmyadmin:latest
        container_name: phpmyadmin
        environment:
            PMA_HOST: db # ระบุ host ที่จะให้ phpmyadmin ไปจัดการ ซึ่งสามารถใส่เป็นชื่อ container name (db) ได้เลย
            PMA_PORT: ${DB_PORT} # ระบุ port ของ Database
            PMA_USER: root # ระบุ user ของ Database
            PMA_PASSWORD: ${DB_ROOT_PASSWORD} # ระบุ password ของ Database
        ports:
            - "${PHP_PORT}:80"
        depends_on:
            - db

        restart: always #ถ้าล่มให้ restart เอง

# volumes จะ map path เองในเครื่อง
volumes:
    mysql_data_test: # กำหนดชื่อ volume ที่ต้องการจะสร้าง
        driver: local # ขอใช้ dists loacl
